# https://taskfile.dev

version: '3'

tasks:
  generate:
    aliases:
      - gen
    desc: "Generate code from proto files"
    cmds:
      - protoc -I pkg/proto pkg/proto/*.proto --go_out=./internal/proto/gen/ --go_opt=paths=source_relative --go-grpc_out=./internal/proto/gen/ --go-grpc_opt=paths=source_relative
